services:
  - type: web
    name: protein-interaction-explorer-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FRONTEND_ORIGIN
        value: https://protein-io.vercel.app
      # Disable the Anthropic-backed chat endpoint on the public deployment.
      - key: CHAT_ENABLED
        value: "false"
